# Compila e pubblica i pacchetti desktop per Linux, Windows e macOS.
# Si attiva quando spingi un tag tipo v0.1.0 (oppure manualmente da GitHub).
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Mac Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: ubuntu-22.04      # Linux (.deb, .rpm, .AppImage)
            args: ""
          - platform: windows-latest    # Windows (.exe NSIS, .msi)
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      # russh usa aws-lc-rs, che per compilarsi vuole cmake (+ nasm su Windows).
      - name: NASM (solo Windows)
        if: matrix.platform == 'windows-latest'
        uses: ilammy/setup-nasm@v1

      - name: Dipendenze di sistema (solo Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            cmake \
            libudev-dev

      - name: Installa dipendenze frontend
        run: npm install

      - name: Build + bundle + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Firma gli artefatti di aggiornamento (createUpdaterArtifacts in tauri.conf).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Oxiterm ${{ github.ref_name }}"
          releaseDraft: true
          releaseBody: "Pacchetti generati automaticamente. .pkg.tar.zst per Arch Linux."
          args: ${{ matrix.args }}

  # --- Arch Linux: pacchetto nativo .pkg.tar.zst via makepkg ---
  arch:
    runs-on: ubuntu-latest
    needs: build              # la release (draft) esiste già, creata dal job build
    permissions:
      contents: write
    container:
      image: archlinux:latest
    steps:
      - name: Strumenti base nel container
        run: pacman -Syu --noconfirm git nodejs npm rust base-devel cmake webkit2gtk-4.1 gtk3 librsvg sudo

      - uses: actions/checkout@v4

      - name: Inietta la versione dal tag nel PKGBUILD
        run: |
          VER="${GITHUB_REF_NAME#v}"        # v0.5.0 -> 0.5.0
          sed -i "s/^pkgver=.*/pkgver=${VER}/" packaging/PKGBUILD
          echo "Versione pacchetto: ${VER}"

      - name: Build del pacchetto (makepkg non gira da root)
        run: |
          useradd -m builder
          chown -R builder:builder .
          sudo -u builder bash -c 'cd packaging && makepkg -f --noconfirm --nodeps'

      - name: Carica il .pkg.tar.zst nella release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: packaging/*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- Pubblica gli artefatti (e l'auto-update) sul repo pubblico oxiterm-dist ---
  pubblica-dist:
    runs-on: ubuntu-latest
    needs: [build, arch]
    steps:
      - name: Scarica gli asset dalla release (privata)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir dist-assets
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" --dir dist-assets

      - name: Riscrivi gli URL di latest.json verso il repo pubblico
        run: |
          cd dist-assets
          if [ -f latest.json ]; then
            sed -i 's#/russus87/oxiterm/releases#/russus87/oxiterm-dist/releases#g' latest.json
            echo "latest.json aggiornato:"; cat latest.json
          else
            echo "ATTENZIONE: latest.json non trovato"; ls -la
          fi

      - name: Pubblica su oxiterm-dist
        env:
          GH_TOKEN: ${{ secrets.DIST_TOKEN }}
        run: |
          cd dist-assets
          gh release create "${GITHUB_REF_NAME}" --repo russus87/oxiterm-dist \
            --title "Oxiterm ${GITHUB_REF_NAME}" \
            --notes "Artefatti e aggiornamenti automatici di Oxiterm." \
            ./* \
          || gh release upload "${GITHUB_REF_NAME}" --repo russus87/oxiterm-dist --clobber ./*
